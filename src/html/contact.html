<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business, Legal, Tax, Accounting, HR, Payroll News | China Briefing</title>
  <meta name="description" content="China Briefing hosts a wealth of business intelligence on legal, tax, and operational issues in China from a practical perspective.">
  <link rel="stylesheet" href="/css/main.min.css">
  <link rel="stylesheet" href="/css/mockups-css/contact.min.css">
</head>
<body>


  @@include('./includes/header.html')    
  
  <main id="main">
    <section class="contact">
      <div class="container">

        <div class="contact__head">
          <h1 class="contact__title">Contact us</h1>
          <p class="contact__sub">How can we help you?</p>
        </div>

        <!-- Tabbed enquiry forms — one shared form, copy swapped per tab -->
        <div class="tabs contact-tabs">
          <div class="tabs__list" role="tablist" aria-label="Enquiry type">
            <button class="tabs__tab" role="tab" id="tab-general" aria-controls="panel-enquiry" aria-selected="true" type="button"
                    data-note="For general questions about our services, please contact us at &lt;a href=&quot;mailto:hello@meridian-example.com&quot;&gt;hello@meridian-example.com&lt;/a&gt;"
                    data-context="General Enquiries">General Enquiries</button>
            <button class="tabs__tab" role="tab" id="tab-bookstore" aria-controls="panel-enquiry" aria-selected="false" type="button"
                    data-note="For orders, invoices, or publication access, please contact us at &lt;a href=&quot;mailto:bookstore@meridian-example.com&quot;&gt;bookstore@meridian-example.com&lt;/a&gt;"
                    data-context="Bookstore Sales Enquiries">Bookstore Sales Enquiries</button>
            <button class="tabs__tab" role="tab" id="tab-editorial" aria-controls="panel-enquiry" aria-selected="false" type="button"
                    data-note="If you would like to reach our editorial staff, please contact us at &lt;a href=&quot;mailto:editor@meridian-example.com&quot;&gt;editor@meridian-example.com&lt;/a&gt;"
                    data-context="Editorial Enquiries">Editorial Enquiries</button>
          </div>

          <div class="tabs__panel" role="tabpanel" id="panel-enquiry" aria-labelledby="tab-general">
            @@include('./sections/enquiry-form.html')
          </div>
        </div>

      </div>
    </section>
  </main>
      @@include('./includes/footer.html')

  <!-- ============ CONTACT MODAL ============ -->
  <div class="modal-overlay" id="contactPopup">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading" style="padding: 0;">
      <button class="modal__close" type="button" aria-label="Close contact form">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <!-- <h2 id="modal-heading" class="text-2xl" style="margin-bottom: var(--space-5);">Talk to our team</h2> -->
          <div class="contact-popup">
            <div class="expert-form">
              <p class="expert-form__title">Get Expert Advice</p>
              <p class="expert-form__intro">Tell us where you wish to grow, and we’ll connect you with the right team across our global network.</p>
              <form class="stack" novalidate>
                <div class="field">
                  <input class="input" type="text" id="eag-name" name="name" autocomplete="name" placeholder="Full name" required>
                </div>
                <div class="field">
                 
                  <input class="input" type="email" id="eag-email" name="email" autocomplete="email" placeholder="Email" required>
                </div>
                <div class="field">
                  
                  <input class="input" type="tel" id="eag-phone" name="phone" autocomplete="tel" placeholder="Phone number" required>
                </div>
                <div class="field">
                  
                  <input class="input" type="text" id="eag-company" name="company" autocomplete="organization" placeholder="Company" required>
                </div>
                                <div class="field">
                  
                  <input class="input" type="text" id="topic" name="topic" autocomplete="organization" placeholder="Topic" required>
                </div>

                                <div class="field">
                  
                 <select  class="select"  id="type_service_required" name="type_service_required" required="" data-touched="true"><option value="Accounting, Financial Reporting &amp; Review">Accounting, Financial Reporting</option><option value="Audit and Risk Advisory">Audit and Risk Advisory</option><option value="Corporate Establishment and Governance">Corporate Establishment and Governance</option><option value="Country Benchmarking / Location Selection">Country Benchmarking / Location Selection</option><option value="Due Diligence">Due Diligence</option><option value="ESG Sustainability Services">ESG Sustainability Services</option><option value="HR Global Mobility PEO / EOR">HR Global Mobility PEO / EOR</option><option value="HR Advisory and Payroll">HR Advisory and Payroll</option><option value="HR Payroll Software">HR Payroll Software</option><option value="HR Visa &amp; Work Permits">HR Visa &amp; Work Permits</option><option value="Intellectual Property">Intellectual Property</option><option value="Joint Ventures and Match making">Joint Ventures and Match making</option><option value="Legal Services">Legal Services</option><option value="M&amp;A - asiamerger portal">M&amp;A - asiamerger portal</option><option value="Market Research &amp; Business Intelligence">Market Research &amp; Business Intelligence</option><option value="Mergers and Acquisitions">Mergers and Acquisitions</option><option value="Recruitment">Recruitment</option><option value="Tax Advisory &amp; Planning">Tax Advisory &amp; Planning</option><option value="Tax International &amp; Transfer Pricing">Tax International &amp; Transfer Pricing</option><option value="Technology, Cyber / Data Privacy">Technology, Cyber / Data Privacy</option><option value="Technology, IT and ERP Services">Technology, IT and ERP Services</option><option value="Other">Other</option><option value="Other, Journalist Comment or Quote">Other, Journalist Comment or Quote</option><option value="Other, Asia Briefing Media/Ad Placement">Other, Asia Briefing Media/Ad Placement</option></select>
                </div>
                <div class="field text-xs">
                  
                 <label class="margin-top-2" for="agree_privary_policy">
            <input type="checkbox" name="agree_privary_policy" id="agree_privary_policy"><span>I agree to receive communications from Dezan Shira &amp;
                Associates and accept the<a href="https://www.dezshira.com/privacy-policy"> Privacy Policy</a></span>
        </label>
                </div>
                <button class="btn btn--primary" type="submit">Submit</button>
              </form>
            </div>
          </div>
    </div>
  </div>

  <script src="/js/main.min.js"></script>
</body>
</html>
